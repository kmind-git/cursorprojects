# Integration tests (profile `test`): MySQL 5.7 test instance.
# If the DB already has tables but no flyway_schema_history, baseline-on-migrate allows startup.
spring:
  datasource:
    url: jdbc:mysql://10.189.111.200:33061/authz_test?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: cursor
    password: cloud_cursor
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL57Dialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

# Mirror main app.security so JWT signing always has a secret under profile `test`.
app:
  security:
    cors:
      allowed-origins:
        - "http://localhost:5173"
        - "http://127.0.0.1:5173"
        - "http://localhost:4173"
        - "http://127.0.0.1:4173"
    jwt:
      issuer: "authz"
      access-ttl-seconds: 900
      secret: "dev-secret-change-me-dev-secret-change-me-dev-secret-change-me"
    refresh:
      ttl-days: 14
      cookie-name: "refresh_token"
    csrf:
      cookie-name: "csrf_token"
      header-name: "X-CSRF-Token"
