server:
  port: 8080

spring:
  application:
    name: authz
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:authz}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL57Dialect
    open-in-view: false
  flyway:
    enabled: true

app:
  security:
    cors:
      allowed-origins:
        - "http://localhost:5173"
        # Different hostnames for dev / authz-web preview
        - "http://127.0.0.1:5173"
        - "http://localhost:4173"
        - "http://127.0.0.1:4173"
    jwt:
      issuer: "authz"
      access-ttl-seconds: 900
      secret: "dev-secret-change-me-dev-secret-change-me-dev-secret-change-me"
    refresh:
      ttl-days: 14
      cookie-name: "refresh_token"
    csrf:
      cookie-name: "csrf_token"
      header-name: "X-CSRF-Token"

logging:
  level:
    com.example.authz: INFO
    org.springframework.security: INFO
