[DEFAULT]
# --- Files ---
FileStorePath=var/store
FileLogPath=var/log

# --- DataDictionary ---
UseDataDictionary=Y
DataDictionary=config/FIX44.xml

# --- Validation / behavior (adjust as needed) ---
ValidateFieldsOutOfOrder=Y
ValidateFieldsHaveValues=Y
ValidateUserDefinedFields=Y
CheckLatency=N
MaxLatency=120

# 开发期可用；如需保留序号请设为 N
ResetOnLogon=Y

# --- Logon extra fields (custom) ---
# 以 LogonTag.<tag>=<value> 的形式配置，运行时会在 Logon (35=A) 注入。
# 示例：
# LogonTag.553=myuser
# LogonTag.554=mypassword
LogonTag.141=Y
LogonTag.553=110853
LogonTag.554=admin@1234

[SESSION]
BeginString=FIX.4.4
ConnectionType=initiator
StartTime=00:00:00
EndTime=23:59:59
HeartBtInt=10

# --- Your FIX session identity ---
SenderCompID=CLIENTCOMPIDT_gq
TargetCompID=HUNDSUNSTRD

# --- Server endpoint ---
SocketConnectHost=10.189.111.200
SocketConnectPort=20007

# --- Optional ---
SenderSubID=1000
# TargetSubID=

# --- Connection / reconnect ---
ReconnectInterval=5
SocketConnectTimeout=10

